# Docker Compose file for Autonomous Orchestrator

version: '3'
services:
  orchestrator:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ORCHESTRATOR_HOST=0.0.0.0
      - ORCHESTRATOR_PORT=8080
    depends_on:
      - agent
  agent:
    build: .
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=8081